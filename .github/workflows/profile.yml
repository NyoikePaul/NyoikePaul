name: Profile Metrics

on:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: NyoikePaul
          template: classic
          base: header, repositories, activity
